version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_automation_hub
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=10.10.10.5 # The MGMT IP we defined in Phase 1
      - TZ=UTC
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
